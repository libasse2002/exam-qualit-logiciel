name: CI/CD Pipeline - Examen

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Quality Reports
    runs-on: ubuntu-latest

    steps:
      # récupération du code source
      - name: Checkout code
        uses: actions/checkout@v4

      # config du JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # compilation du projet
      - name: Compile
        run: mvn compile -B

      #  tests unitaires et intégration avec JaCoCo
      - name: Run Tests
        run: mvn test -B

      #  génération du rapport JaCoCo (couverture de code)
      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report -B

      #  rapport Checkstyle (qualité statique)
      - name: Run Checkstyle
        run: mvn checkstyle:check -B
        continue-on-error: true

      # publication du rapport de couverture dans le résumé GitHub
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      # upload du rapport Checkstyle
      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 14

      # construction du jar final (sans les tests)
      - name: Package JAR
        run: mvn package -DskipTests -B

      #  upload du jar comme artefact de déploiement
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assurance_examen
          path: target/*.jar
          retention-days: 30
